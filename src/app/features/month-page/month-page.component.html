@let yearActivitiesLoading = monthStore.yearActivitiesLoading();

<div class="content">
  <div class="block block--first">
    <div class="subtitle font-700 subtitle--active">
      Statistiques  {{ year() }}
    </div>

  @if(yearActivitiesLoading) {
    <app-cycle-loader></app-cycle-loader>
  } @else {
    @if(statsCurrentYear().length > 0) {         
      <app-global-result
        [criteria]="statsCurrentYear()"
        [isStatsGlobales]="true"
      ></app-global-result>
    }
  }
  </div>

  @if(yearActivitiesLoading) {
    <app-cycle-loader></app-cycle-loader>
  } @else {
    @for(month of availableMonths(); track month) {
      <app-card-infos
        (click)="onOpenWeekPage(year()!, month)"
        [year]="year()"
        [month]="month"
      >
        <app-month-result
          [results]="getMonthStats(month)"
        ></app-month-result>
      </app-card-infos>
    } 
  }
</div>
